<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    overflow:hidden;
    background:transparent;
}

iframe{
    position:absolute;
    border:none;
    background:transparent;
    pointer-events:none;
}

/* 💬 YOUTUBE CHAT (LOWERED) */
.yt-chat{
    top:5%;
    left:50%;
    transform:translateX(-50%);

    width:80%;
    height:6%;

    opacity:.92;
    z-index:30;
}

/* 🪙 COIN JAR */
.coin-jar{
    top:34%;
    left:50%;
    transform:translate(-50%,-50%);

    width:38%;
    height:58%;

    z-index:10;
}

/* 🔥 TIKTOK ALERTS */
.tiktok-alert{
    top:34%;
    left:50%;
    transform:translate(-50%,-50%);

    width:72%;
    height:42%;

    overflow:visible;

    z-index:50;
}

/* ⭐ YOUTUBE ALERTS */
.yt-alerts{
    top:33%;
    left:50%;
    transform:translate(-50%,-50%);

    width:90%;
    height:60%;

    overflow:visible;

    pointer-events:none;

    z-index:100000;
}

/* 🏆 LEFT BOARD */
.left-board{
    top:29%;
    left:10%;

    width:24%;
    height:26%;

    z-index:20;
}

/* 🏆 RIGHT BOARD */
.right-board{
    top:29%;
    right:10%;

    width:24%;
    height:26%;

    z-index:20;
}

</style>

</head>

<body>
